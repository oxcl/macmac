<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MacMac</title>
    <meta name="manifest.type" content="browser_action" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <header>
        <img src="/icon/128.png" class="logo" alt="Logo" />
        <h1>MacMac</h1>
      </header>

      <div id="error-bar" class="error-bar hidden"></div>

      <div id="hostname-display" class="hostname-display"></div>
      <p id="no-hostname" class="hidden" data-i18n="noHostname">
        Navigate to a website to manage containers.
      </p>

      <section id="containers-section" class="containers-list">
        <div class="container-group">
          <h3 class="group-header" data-i18n="activeAccount">Active Account</h3>
          <div class="group-items" id="active-items"></div>
        </div>
        <div class="container-group" id="other-group">
          <h3 class="group-header" data-i18n="otherAccounts">Other Accounts</h3>
          <div class="group-items" id="other-items"></div>
        </div>
      </section>

      <div id="create-section" class="create-container-section">
        <button id="createContainerBtn" type="button" class="create-btn">
          <span class="create-btn-icon">+</span>
          <span data-i18n="createNewAccount">Create New Account</span>
        </button>
      </div>
    </div>

    <footer class="popup-footer">
      <select id="lang-selector" class="lang-selector"></select>
      <span class="footer-text"
        ><span data-i18n="madeBy">made by </span
        ><a href="https://github.com/oxcl" target="_blank" class="footer-author-link"
          ><strong>oxcl</strong></a
        ></span
      >
      <div class="footer-links">
        <a href="https://github.com/oxcl/macmac" target="_blank" class="footer-link" title="GitHub">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
            />
          </svg>
        </a>
        <a href="https://oxcl.github.io/macmac" target="_blank" class="footer-link" title="Website">
          <svg
            class="icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="2" y1="12" x2="22" y2="12" />
            <path
              d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
            />
          </svg>
        </a>
      </div>
    </footer>

    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal">
        <h3 id="modal-title"></h3>
        <div id="modal-body"></div>
        <div class="modal-actions">
          <button id="modal-cancel" class="modal-btn cancel" type="button" data-i18n="cancel">
            Cancel
          </button>
          <button id="modal-confirm" class="modal-btn confirm" type="button" data-i18n="ok">
            OK
          </button>
        </div>
      </div>
    </div>

    <div id="support-modal-overlay" class="modal-overlay hidden">
      <div class="modal support-modal">
        <h3 data-i18n="supportTitle">Enjoying MacMac?</h3>
        <div class="support-modal-body">
          <p class="support-modal-text" data-i18n="supportText">
            It's free and open source! If you find it useful, please consider supporting:
          </p>
          <div class="support-buttons">
            <button class="support-btn" data-action="github">
              <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
                />
              </svg>
              <span data-i18n="starGithub">Star on GitHub</span>
            </button>
            <button class="support-btn" data-action="rate">
              <svg
                class="icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polygon
                  points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                />
              </svg>
              <span data-i18n="rateFirefox">Rate on Firefox Add-ons</span>
            </button>
            <button class="support-btn" data-action="donate">
              <svg
                class="icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                />
              </svg>
              <span data-i18n="donate">Donate</span>
            </button>
          </div>
          <div class="support-dismiss">
            <button
              class="support-dismiss-btn"
              data-action="not-interested"
              data-i18n="notInterested"
            >
              Not interested
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
