<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MacMac</title>
    <meta name="manifest.type" content="browser_action" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <header>
        <img src="/icon/128.png" class="logo" alt="Logo" />
        <h1>MacMac</h1>
      </header>

      <div id="hostname-display" class="hostname-display"></div>
      <p id="no-hostname" class="hidden">Navigate to a website to manage containers.</p>

      <section id="containers-section" class="containers-list">
        <h2>Accounts</h2>
        <div id="container-items"></div>
      </section>

      <div id="create-section" class="create-container-section">
        <button id="createContainerBtn" type="button" class="create-btn">
          <span class="create-btn-icon">+</span>
          Create New Account
        </button>
        <div id="createMessage" class="message"></div>
      </div>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal">
        <h3 id="modal-title"></h3>
        <div id="modal-body"></div>
        <div class="modal-actions">
          <button id="modal-cancel" class="modal-btn cancel" type="button">Cancel</button>
          <button id="modal-confirm" class="modal-btn confirm" type="button">OK</button>
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
